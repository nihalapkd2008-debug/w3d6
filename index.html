<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
        }

        h1{
            text-align:center;
        }

        textarea{
            width:100%;
            height:100px;
            padding:10px;
        }

        button{
            padding:10px 15px;
            margin-top:10px;
            cursor:pointer;
        }

        .note{
            border:1px solid #ccc;
            padding:10px;
            margin-top:10px;
        }

        .actions{
            margin-top:10px;
        }

    </style>
</head>
<body>

    <h1>Notes App</h1>

    <textarea id="noteInput"
    placeholder="Enter your note"></textarea>

    <br>

    <button id="addBtn">
        Add Note
    </button>

    <div id="notesContainer"></div>

    <script src="script.js"></script>

</body>
</html>
